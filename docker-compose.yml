version: "3.9"

services:
  neo4j:
    image: neo4j:5.20-community
    container_name: sentinel-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-sentinel_pass}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=512M
      - NEO4J_dbms_memory_heap_max__size=1G
    ports:
      - "7474:7474"   # Neo4j browser
      - "7687:7687"   # Bolt protocol
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sentinel-backend
    env_file:
      - .env
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - CHROMA_PERSIST_DIR=/app/data/chroma_store
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - chroma_store:/app/data/chroma_store
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sentinel-frontend
    env_file:
      - .env
    environment:
      - BACKEND_API_URL=http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_store:
